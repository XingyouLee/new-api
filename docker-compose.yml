# New-API Docker Compose Configuration
# 
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3333
#
# This file is pinned for Levi's local environment:
#   - App listens on port 3333
#   - PostgreSQL runs on the host machine
#   - Redis runs in Docker

version: '3.4' # For compatibility with older Docker versions

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3333:3333"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - PORT=3333
      - SQL_DSN=postgresql://levi@host.docker.internal:5432/new_api_local
      - REDIS_CONN_STRING=redis://redis
      - TZ=Europe/Amsterdam
      - ERROR_LOG_ENABLED=true # 是否启用错误日志记录 (Whether to enable error log recording)
      - BATCH_UPDATE_ENABLED=true  # 是否启用批量更新 (Whether to enable batch update)
      - SESSION_SECRET=98972975989b4eec579446a382125ca0e19e580ffcaa7e56deea56a34d75b8f7
      - CRYPTO_SECRET=84f9d54e0d7303b629caa6156fd2019467304ddc294e9f0819807adf88a3f4de
#      - STREAMING_TIMEOUT=300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      - SYNC_FREQUENCY=60  # Uncomment if regular database syncing is needed
#      - GOOGLE_ANALYTICS_ID=G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      - UMAMI_WEBSITE_ID=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      - UMAMI_SCRIPT_URL=https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
#      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3333/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

